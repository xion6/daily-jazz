name: Daily Jazz Recommendation

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST（UTC 00:00）
  workflow_dispatch:       # 手動実行もできるようにしておく

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  jazz:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Fetch past songs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list --label "daily-jazz" --limit 50 --json body \
            | jq -r '.[].body' \
            | grep -oP '(?<=\*\*曲名\*\*: ).+' \
            >> past_songs.txt || true
          echo "PAST_SONGS<<EOF" >> $GITHUB_ENV
          cat past_songs.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run daily jazz
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PAST_SONGS: ${{ env.PAST_SONGS }}
        run: python tasks/daily_jazz.py > jazz_output.txt

      - name: Create GitHub Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          gh issue create \
            --title "🎷 Daily Jazz: $TODAY" \
            --body "$(cat jazz_output.txt)" \
            --label "daily-jazz"
